<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Hub</title>
<style>
:root{
  --bg:#0b0e13; --panel:#141922; --panel2:#1a2130; --border:#242d3f;
  --text:#e6ebf2; --muted:#8b97ab; --accent:#f5b942;
  --green:#2ecc71; --red:#e74c5b; --blue:#4aa3ff; --purple:#a78bfa;
  --font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --mono:'SF Mono',Consolas,Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
header{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:50;flex-wrap:wrap}
header h1{font-size:17px;letter-spacing:.5px}
header h1 span{color:var(--accent)}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:none;border:1px solid transparent;color:var(--muted);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
nav button:hover{color:var(--text)}
nav button.active{background:var(--panel2);color:var(--accent);border-color:var(--border)}
#subnav{display:flex;gap:4px;padding:8px 22px;background:#0f1420;border-bottom:1px solid var(--border)}
#subnav:empty{display:none}
#subnav button{background:none;border:none;color:var(--muted);padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600}
#subnav button.active{background:var(--panel2);color:var(--text)}
#subnav button:hover{color:var(--text)}
main{padding:22px;max-width:1280px;margin:0 auto}
.grid{display:grid;gap:14px}
.cards{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:16px}
.card .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.card .v{font-size:26px;font-weight:700;font-family:var(--mono)}
.card .s{font-size:12px;color:var(--muted);margin-top:4px}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;margin-top:14px}
.panel h2{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:12px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #1c2434;vertical-align:top}
tr.rowbtn{cursor:pointer}
tr.rowbtn:hover td{background:#161d2a}
.tag{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.4px}
.tag.hit{background:rgba(46,204,113,.15);color:var(--green)}
.tag.miss{background:rgba(231,76,91,.15);color:var(--red)}
.tag.avoid{background:rgba(167,139,250,.15);color:var(--purple)}
.tag.pend{background:rgba(74,163,255,.14);color:var(--blue)}
.tag.watch{background:rgba(245,185,66,.15);color:var(--accent)}
.stars{color:var(--accent);letter-spacing:1px;white-space:nowrap}
.num{font-family:var(--mono)}
.pos{color:var(--green)}.neg{color:var(--red)}
.muted{color:var(--muted)}
button.btn{background:var(--accent);color:#151515;border:none;padding:8px 16px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px}
button.btn.ghost{background:var(--panel2);color:var(--text);border:1px solid var(--border)}
button.btn.sm{padding:4px 10px;font-size:12px}
input,select,textarea{background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:13px;font-family:var(--font)}
textarea{width:100%;font-family:var(--mono);font-size:12px}
input:focus,select:focus,textarea:focus{outline:1px solid var(--accent)}
.formrow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;align-items:flex-end}
.formrow label{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.detail{background:var(--panel2);border-radius:10px;padding:14px;margin:6px 0}
.layers{display:flex;gap:0;flex-wrap:wrap;align-items:center;font-family:var(--mono);font-size:13px;margin:8px 0}
.layers .step{background:#0f1420;border:1px solid var(--border);border-radius:8px;padding:8px 12px;text-align:center;min-width:86px}
.layers .step .lk{font-size:10px;text-transform:uppercase;color:var(--muted);letter-spacing:.7px}
.layers .step .lv{font-size:15px;font-weight:700;margin-top:2px}
.layers .arr{padding:0 8px;color:var(--muted)}
.layers .final{border-color:var(--accent)}
.layers .final .lv{color:var(--accent)}
#toast{position:fixed;bottom:22px;right:22px;background:var(--panel2);border:1px solid var(--accent);color:var(--text);padding:12px 18px;border-radius:10px;display:none;z-index:99;max-width:420px}
.bar{height:8px;background:#0f1420;border-radius:5px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--green)}
details.rule{border-bottom:1px solid #1c2434;padding:8px 4px}
.flex{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.right{margin-left:auto}
.calcout{background:#0f1420;border:1px solid var(--accent);border-radius:12px;padding:18px;margin-top:14px;text-align:center}
.calcout .big{font-size:38px;font-weight:800;font-family:var(--mono);color:var(--accent)}
.small{font-size:12px}
@media(max-width:700px){main{padding:12px}.layers .step{min-width:70px}}
</style>
</head>
<body>
<header>
  <h1>⚽ PREDICTION <span>HUB</span></h1>
  <nav id="nav"></nav>
  <div class="right small muted" id="syncstate">connecting…</div>
</header>
<div id="subnav"></div>
<main id="main">Loading…</main>
<div id="toast"></div>

<script>
const SB_URL = "https://fcuasuedmjrllqktkhql.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZjdWFzdWVkbWpybGxxa3RraHFsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyODQ5NDgsImV4cCI6MjA5ODg2MDk0OH0.8XtNieLQuFKnCmcTSp7P1RC5VNA84VNhck4JOKqhlsg";

const H = {apikey:SB_KEY, Authorization:"Bearer "+SB_KEY, "Content-Type":"application/json"};
async function api(path, opts={}){
  const r = await fetch(SB_URL+"/rest/v1/"+path, {headers:{...H, ...(opts.headers||{})}, method:opts.method||"GET", body:opts.body?JSON.stringify(opts.body):undefined});
  if(!r.ok){ const t=await r.text(); throw new Error(r.status+" "+t); }
  return r.status===204?null:r.json();
}

let DB = {predictions:[], players:[], coaches:[], teams:[], venues:[], news:[], settings:{}, plf:[], plt:[], plstate:null};
let TAB = location.hash.replace("#","") || "dashboard";

async function loadAll(){
  document.getElementById("syncstate").textContent="syncing…";
  const [p,pl,co,te,ve,ne,se,plf,plt,au] = await Promise.all([
    api("predictions?select=*&order=match_date.desc.nullslast,entry_no.desc"),
    api("players?select=*&order=team.asc,prs.desc"),
    api("coaches?select=*&order=team.asc"),
    api("teams?select=*&order=name.asc"),
    api("venues?select=*&order=altitude_m.desc"),
    api("news_items?select=*&order=item_date.desc,id.desc"),
    api("settings?select=*"),
    api("pl_fixtures?select=*&order=kickoff.asc.nullslast"),
    api("pl_teams?select=*&order=name.asc"),
    api("autopsies?select=*&order=id.asc")
  ]);
  DB={predictions:p, players:pl, coaches:co, teams:te, venues:ve, news:ne, settings:Object.fromEntries(se.map(s=>[s.key,s.value])), plf:plf, plt:plt, autopsies:au};
  DB.plstate = DB.settings.pl_state || null;
  document.getElementById("syncstate").textContent="✓ synced "+new Date().toLocaleTimeString();
  render();
}
async function syncPL(silent=true){
  try{
    const r = await fetch(SB_URL+"/functions/v1/sync-pl");
    const d = await r.json();
    if(d.ok){ const formOpen = showAddPred||showAddNews||showAddPlayer||showAddCoach||showAddVenue; if(!formOpen) await loadAll(); if(!silent) toast("PL data refreshed — "+d.fixtures+" fixtures"); }
  }catch(e){ if(!silent) toast("PL sync failed: "+e.message,false); }
}
function toast(m,ok=true){const t=document.getElementById("toast");t.textContent=m;t.style.borderColor=ok?"var(--green)":"var(--red)";t.style.display="block";setTimeout(()=>t.style.display="none",3500);}
const esc = s => (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const starstr = n => n?("⭐".repeat(Math.min(n,6))):"—";
const fmtadj = v => v==null||v===0?'<span class="muted">—</span>':`<span class="${v>0?'pos':'neg'} num">${v>0?'+':''}${v}%</span>`;
const outcomeTag = o => !o?'<span class="tag pend">PENDING</span>':o==="HIT"?'<span class="tag hit">✅ HIT</span>':o==="MISS"?'<span class="tag miss">❌ MISS</span>':o==="UNRESOLVED"?'<span class="tag pend" style="opacity:.6">UNRESOLVED</span>':o.startsWith("AVOID")?`<span class="tag avoid">${o==="AVOID_CORRECT"?"✅":"❌"} ${o.replace("_"," ")}</span>`:esc(o);

/* ---------- NAV ---------- */
const GROUPS = [
  {id:"dashboard", label:"Dashboard", tabs:[["dashboard","Dashboard"]]},
  {id:"fixtures",  label:"Fixtures",  tabs:[["fixtures","Fixtures / Lineup Watch"]]},
  {id:"preds",     label:"Predictions", tabs:[["predictions","Log"],["autopsies","Autopsies"]]},
  {id:"league",    label:"League",    tabs:[["pltable","Table & Team Profiles"],["venues","Venues (AIS)"]]},
  {id:"squads",    label:"Scouting Report", tabs:[["scout","Clubs"],["players","Players (PRS)"],["coaches","Coaches (TMS)"]]},
  {id:"tools",     label:"Tools",     tabs:[["calculator","Calculator"],["data","Import / Export"]]},
];
const LASTTAB={};
const groupOf = t => GROUPS.find(g=>g.tabs.some(([k])=>k===t)) || GROUPS[0];
function renderNav(){
  const g=groupOf(TAB);
  document.getElementById("nav").innerHTML = GROUPS.map(gr=>`<button class="${gr.id===g.id?'active':''}" onclick="goGroup('${gr.id}')">${gr.label}</button>`).join("");
  document.getElementById("subnav").innerHTML = g.tabs.length>1 ? g.tabs.map(([k,l])=>`<button class="${TAB===k?'active':''}" onclick="go('${k}')">${l}</button>`).join("") : "";
}
function goGroup(id){
  const g=GROUPS.find(x=>x.id===id);
  go(LASTTAB[id]||g.tabs[0][0]);
}
function go(t){TAB=t;LASTTAB[groupOf(t).id]=t;location.hash=t;render();}

function render(){
  renderNav();
  const m=document.getElementById("main");
  if(TAB==="dashboard") m.innerHTML=vDashboard();
  else if(TAB==="predictions") m.innerHTML=vPredictions();
  else if(TAB==="fixtures") m.innerHTML=vFixtures();
  else if(TAB==="pltable"){renderPLTable();return;}
  else if(TAB==="autopsies"){renderAutopsies();return;}
  else if(TAB==="scout") m.innerHTML=vScout();
  else if(TAB==="players") m.innerHTML=vPlayers();
  else if(TAB==="coaches") m.innerHTML=vCoaches();
  else if(TAB==="venues") m.innerHTML=vVenues();
  else if(TAB==="calculator") m.innerHTML=vCalc();
  else if(TAB==="data") m.innerHTML=vData();
  window.scrollTo(0,0);
}

/* ---------- PL HELPERS ---------- */
const getFx = id => DB.plf.find(f=>f.id===id);
const fxLabel = f => `${f.team_h_name} vs ${f.team_a_name}`;
const fxScore = f => f.team_h_score==null?"":`${f.team_h_score}-${f.team_a_score}`;
const fxWinner = f => !f.finished?null:(f.team_h_score>f.team_a_score?f.team_h_name:f.team_a_score>f.team_h_score?f.team_a_name:"Draw");
const fxResultStr = f => `${f.team_h_name} ${f.team_h_score}-${f.team_a_score} ${f.team_a_name}`;
function seasonNotStarted(s){ return s && !s.season_over && (s.current_gw==null); }
function plBanner(){
  const s=DB.plstate;
  if(!s) return `<div class="panel" style="margin-top:0"><h2>Premier League</h2><p class="muted">No PL data yet — <button class="btn sm" onclick="syncPL(false)">Sync now</button></p></div>`;
  let big, sub, extra="";
  if(s.season_over){
    big=`SEASON ${s.season} COMPLETE`;
    sub=`All 38 matchweeks played · next season's fixtures load automatically when the FPL API resets (usually July)`;
  } else if(seasonNotStarted(s)){
    big=`SEASON ${s.season} — NOT STARTED`;
    sub=s.first_kickoff?`First kickoff: ${new Date(s.first_kickoff).toLocaleString([],{dateStyle:"full",timeStyle:"short"})}`:"Fixtures loaded, awaiting kickoff";
  } else {
    big=`MATCHWEEK ${s.current_gw} <span class="muted" style="font-weight:400">of 38</span>`;
    sub=`Season ${s.season}`;
    const live=DB.plf.filter(f=>f.started&&!f.finished);
    if(live.length) extra=`<div style="margin-top:8px">${live.map(f=>`<span class="tag miss">● LIVE</span> ${esc(fxLabel(f))} <b class="num">${fxScore(f)}</b>`).join(" &nbsp; ")}</div>`;
  }
  return `<div class="panel" style="margin-top:0;border-color:var(--accent)">
    <div class="flex"><div>
      <div style="font-size:22px;font-weight:800;letter-spacing:.5px">${big}</div>
      <div class="muted small" style="margin-top:4px">${sub}</div>${extra}
    </div>
    <div class="right small muted" style="text-align:right">last sync ${s.last_sync?new Date(s.last_sync).toLocaleTimeString():"—"}<br><button class="btn ghost sm" onclick="syncPL(false)" style="margin-top:4px">↻ Refresh</button></div></div>
  </div>`;
}
function plTable(){
  const done=DB.plf.filter(f=>f.finished&&f.team_h_name&&f.team_a_name);
  const t={};
  for(const tm of DB.plt) t[tm.name]={team:tm.name,p:0,w:0,d:0,l:0,gf:0,ga:0,cs:0,pts:0,form:[],hw:0,hd:0,hl:0,aw:0,ad:0,al:0};
  const byDate=[...done].sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff));
  for(const f of byDate){
    const h=t[f.team_h_name],a=t[f.team_a_name]; if(!h||!a)continue;
    h.p++;a.p++;h.gf+=f.team_h_score;h.ga+=f.team_a_score;a.gf+=f.team_a_score;a.ga+=f.team_h_score;
    if(f.team_a_score===0)h.cs++; if(f.team_h_score===0)a.cs++;
    if(f.team_h_score>f.team_a_score){h.w++;h.hw++;a.l++;a.al++;h.pts+=3;h.form.push("W");a.form.push("L");}
    else if(f.team_h_score<f.team_a_score){a.w++;a.aw++;h.l++;h.hl++;a.pts+=3;a.form.push("W");h.form.push("L");}
    else{h.d++;h.hd++;a.d++;a.ad++;h.pts++;a.pts++;h.form.push("D");a.form.push("D");}
  }
  return Object.values(t).sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf);
}
const formBadges = arr => arr.slice(-5).map(r=>`<span class="tag ${r==="W"?"hit":r==="L"?"miss":"pend"}" style="padding:1px 6px;margin-right:2px">${r}</span>`).join("");

/* ---------- DASHBOARD ---------- */
function tierStats(){
  const legacy = DB.settings.legacy_record||{};
  const live = DB.predictions.filter(p=>p.outcome);
  const t = {five:{h:legacy.five_star?.hits||0,t:legacy.five_star?.total||0}, four:{h:legacy.four_star?.hits||0,t:legacy.four_star?.total||0}, three:{h:0,t:0}, avoid:{h:legacy.avoid?.correct||0,t:legacy.avoid?.total||0}};
  for(const p of live){
    if(p.outcome==="AVOID_CORRECT"){t.avoid.h++;t.avoid.t++;continue;}
    if(p.outcome==="AVOID_INCORRECT"){t.avoid.t++;continue;}
    if(p.outcome==="UNRESOLVED"||p.outcome==="PENDING")continue;
    const hit = p.outcome==="HIT";
    if(p.stars>=5){t.five.t++; if(hit)t.five.h++;}
    else if(p.stars===4){t.four.t++; if(hit)t.four.h++;}
    else {t.three.t++; if(hit)t.three.h++;}
  }
  return t;
}
function betStats(){
  let h=0,t=0,rows=[];
  for(const p of DB.predictions) for(const b of (p.bets||[])){
    if(b.result){t++; if(b.result==="HIT")h++; rows.push({match:p.match,...b});}
  }
  return {h,t,rows};
}
function edgeStats(){
  const rows = DB.predictions.filter(p=>p.closing_odds&&p.final_prob);
  let sum=0;
  for(const r of rows){const mkt = r.market_prob ?? (100/r.closing_odds); sum += (r.final_prob-mkt);}
  return {n:rows.length, avg:rows.length?(sum/rows.length):null};
}
let SCAN=null;
async function scanWeek(){
  const out=document.getElementById("scanout");
  if(out)out.innerHTML='<p class="muted small">Scanning — loading five seasons of data…</p>';
  try{
    await Promise.all([ensureHist(),ensureAllProfiles(),ensureRotation(),ensureCalendar()]);
    if(!plSeason) plSeason=SEASON_LIVE()||seasonList()[0];
    const ups=DB.plf.filter(f=>!f.started&&f.kickoff&&new Date(f.kickoff)>Date.now()).sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff)).slice(0,12);
    if(!ups.length){SCAN=[];if(out)out.innerHTML='<p class="muted small">No upcoming fixtures scheduled yet — the scan lights up once the season fixtures load.</p>';return;}
    SCAN=ups.map(f=>{const E=matchupEngine(f.team_h_name,f.team_a_name,true);return E?{f,E,edge:Math.abs(E.base-50)+(E.lowSample?-8:0)}:null;}).filter(Boolean).sort((a,b)=>b.edge-a.edge);
    if(out)out.innerHTML=renderScan();
  }catch(e){ if(out)out.innerHTML='<p class="neg small">Scan failed: '+esc(e.message)+'</p>'; }
}
function renderScan(){
  if(!SCAN||!SCAN.length)return '<p class="muted small">Nothing to scan yet.</p>';
  return `<table><tr><th>#</th><th>Match</th><th>Lean</th><th>Base</th><th>Script</th><th></th></tr>`+SCAN.map((r,i)=>{
    const homeLean=r.E.base>=50;
    return `<tr class="rowbtn" onclick="openScanReport(${r.f.id})"><td class="num muted">${i+1}</td><td><b>${esc(fxLabel(r.f))}</b> <span class="muted small">${r.f.kickoff?new Date(r.f.kickoff).toLocaleDateString([],{weekday:"short"}):""}</span></td>
    <td><b>${esc(homeLean?r.f.team_h_name:r.f.team_a_name)}</b></td><td class="num" style="color:var(--accent);font-weight:700">${homeLean?r.E.base:100-r.E.base-Math.round(r.E.poisson.d)}%</td>
    <td class="small muted">${esc(r.E.script.code)}</td><td>${r.E.lowSample?'<span class="tag miss">LOW SAMPLE</span>':""}${r.E.alerts.length?' <span class="tag watch">👁</span>':""} <span class="tag pend">report →</span></td></tr>`}).join("")+`</table>
    <p class="small muted" style="margin-top:6px">Edge-ranked. This is the BASE layer talking — your PRS/TMS/context reads decide whether any of these become bets.</p>`;
}
function openScanReport(fid){
  const f=getFx(fid); if(!f)return;
  profileTeam=f.team_h_name; h2hOpp=f.team_a_name; h2hVenue="home";
  go("pltable");
}
function vDashboard(){
  const t=tierStats(), bs=betStats(), es=edgeStats();
  const pct=(h,tt)=>tt?Math.round(h/tt*100)+"%":"—";
  const legacy = DB.settings.legacy_record||{};
  const pending = DB.predictions.filter(p=>p.stage==="predicted"&&!p.outcome);
  const watch = DB.predictions.filter(p=>p.lineup_watch&&!p.outcome);
  const rules = DB.settings.hard_rules||[];
  return plBanner()+`
  <div class="grid cards">
    ${card("5-6★ Record",pct(t.five.h,t.five.t),`${t.five.h}/${t.five.t} · bet with confidence`,t.five.h,t.five.t)}
    ${card("4★ Record",pct(t.four.h,t.four.t),`${t.four.h}/${t.four.t} · standard bets`,t.four.h,t.four.t)}
    ${card("AVOID Correct",pct(t.avoid.h,t.avoid.t),`${t.avoid.h}/${t.avoid.t} · discipline is a position`,t.avoid.h,t.avoid.t)}
    ${card("Game-Script Bets",pct(bs.h,bs.t),`${bs.h}/${bs.t} · TMS supplementary markets`,bs.h,bs.t)}
    ${card("Edge vs Market",es.avg==null?"—":(es.avg>0?"+":"")+es.avg.toFixed(1)+"pp",es.n?`${es.n} priced calls`:"log closing odds to measure")}
  </div>
  ${pending.length?`<div class="panel"><h2>Live Calls</h2><table><tr><th>Match</th><th>Pick</th><th>Prob</th><th>Stars</th><th></th></tr>${pending.map(p=>{const f=p.fixture_id?getFx(p.fixture_id):null;const resin=f&&f.finished;return `<tr class="rowbtn" onclick="expandId=${p.id};go('predictions')"><td>${esc(p.match)}</td><td><b>${esc(p.pick)}</b></td><td class="num">${p.final_prob}%</td><td class="stars">${starstr(p.stars)}</td><td>${resin?`<span class="tag hit">RESULT IN ${fxScore(f)} — settle</span>`:p.lineup_watch?'<span class="tag watch">👁 LINEUP WATCH</span>':''}</td></tr>`}).join("")}</table></div>`:""}

}

const cap=(v,c)=>Math.max(-c,Math.min(c,v||0));
async function addPred(){
  const g=id=>document.getElementById(id);
  const base=+g("np_base").value||null;
  const prs=cap(+g("np_prs").value,15), ais=+g("np_ais").value||0, tms=cap(+g("np_tms").value,6), ctx=+g("np_ctx").value||0;
  const body={entry_no:+g("np_no").value||null, match:g("np_match").value, competition:g("np_comp").value, match_date:g("np_date").value||null,
    venue:g("np_venue").value||null, stage:"predicted", pick:g("np_pick").value||null, base_prob:base, prs_adj:prs, ais_adj:ais, tms_adj:tms, context_adj:ctx,
    final_prob:base!=null?Math.round(base+prs+ais+tms+ctx):null, stars:+g("np_stars").value, game_script:g("np_script").value||null,
    is_avoid:g("np_avoid").checked, lineup_watch:g("np_watch").checked, lineup_watch_note:g("np_watchnote").value||null,
    layer_notes:g("np_notes").value?{note:g("np_notes").value}:{}, fixture_id:+g("np_fx").value||null};
  if(!body.match) return toast("Match required",false);
  try{await api("predictions",{method:"POST",body}); showAddPred=false; PREFILL=null; toast("Prediction logged"); loadAll();}catch(e){toast(e.message,false)}
}
async function settle(id){
  const g=k=>document.getElementById(k+"_"+id).value;
  const odds=+g("odds")||null;
  const body={result:g("res")||null, outcome:g("out"), audit_notes:g("aud")||null, stage:"settled", closing_odds:odds, market_prob:odds?+(100/odds).toFixed(1):null};
  try{await api("predictions?id=eq."+id,{method:"PATCH",body}); toast("Settled"); loadAll();}catch(e){toast(e.message,false)}
}
async function delPred(id){ if(!confirm("Delete this entry?"))return; try{await api("predictions?id=eq."+id,{method:"DELETE"}); expandId=null; toast("Deleted"); loadAll();}catch(e){toast(e.message,false)} }

function openOrCreateAutopsy(pid){

function matchStatsFor(p){
  const f=p.fixture_id?getFx(p.fixture_id):null;
  if(!f||!HIST)return null;
  const m=HIST.find(m2=>m2.season===f.season&&m2.home===f.team_h_name&&m2.away===f.team_a_name);
  if(!m||m.fthg==null)return null;
  return {halftime:`${m.hthg}-${m.htag}`, fulltime:`${m.fthg}-${m.ftag}`, shots:`${m.hs??"?"} - ${m.aws??"?"}`, on_target:`${m.hst??"?"} - ${m.ast??"?"}`, cards:`${(m.hy||0)}y${(m.hr||0)?"+"+m.hr+"r":""} - ${(m.ay||0)}y${(m.ar||0)?"+"+m.ar+"r":""}`, referee:m.referee||""};
}

function autopsyPatterns(){
  const A=DB.autopsies||[];
  if(!A.length)return "";
  const tagc={}, layerc={};
  let lessons=0, rules=0;
  for(const a of A){
    for(const t of (a.tags||[])) tagc[t]=(tagc[t]||0)+1;
    for(const [k,v] of Object.entries(a.divergence||{})) if(v) layerc[k]=(layerc[k]||0)+1;
    lessons+=(a.lessons||[]).length; rules+=(a.rules_created||[]).length;
  }
  const misses=DB.predictions.filter(p=>p.outcome==="MISS").length;
  const maxl=Math.max(1,...Object.values(layerc));
  return `<div class="panel"><h2>Pattern Analysis — across ${A.length} autopsies</h2>
  <div class="grid cards" style="margin-bottom:12px">
    ${card("Misses autopsied",A.length+"/"+misses, misses>A.length?"⚠ "+(misses-A.length)+" miss(es) without autopsy":"every miss examined")}
    ${card("Lessons banked",lessons,"distilled from failures")}
    ${card("Rules created",rules,"permanent system upgrades")}
  </div>
  <p class="small muted" style="margin-bottom:6px">WHICH LAYER GETS BLAMED (from divergence entries):</p>
  ${Object.entries(layerc).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="flex" style="margin:3px 0"><span class="num" style="width:70px;text-transform:uppercase">${esc(k)}</span><div class="bar" style="flex:1;max-width:300px"><i style="width:${v/maxl*100}%;background:var(--red)"></i></div><span class="num muted small">${v}×</span></div>`).join("")}
  <p class="small muted" style="margin:10px 0 4px">RECURRING TAGS:</p>
  ${Object.entries(tagc).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`<span class="tag ${n>1?"miss":"pend"}" style="margin:2px">${esc(t)}${n>1?" ×"+n:""}</span>`).join(" ")}
  ${Object.values(tagc).some(n=>n>1)?'<p class="small" style="margin-top:8px"><b class="neg">Repeated tags = repeated failure modes.</b> Anything at ×2+ deserves a hard rule if one does not exist yet.</p>':""}
  </div>`;
}

  ${(()=>{const un=DB.predictions.filter(p=>p.outcome==="MISS"&&!autopsyFor(p.id));return un.length?`<div class="panel"><h2>⚠ Unexamined misses</h2>${un.map(p=>`<div class="flex" style="margin:6px 0"><span>${esc(p.match)} — ${esc(p.result||"")}</span><button class="btn sm right" onclick="openOrCreateAutopsy(${p.id})">Write autopsy</button></div>`).join("")}</div>`:""})()}`;

function wxFor(f){
  if(!f.kickoff||f.started)return null;
  const days=(new Date(f.kickoff)-Date.now())/864e5;
  if(days<0||days>6.5)return null;
  const co=CITY[f.team_h_name]; if(!co)return null;
  const key=f.team_h_name+"|"+f.kickoff.slice(0,13);
  if(WX[key])return WX[key];
  if(!WXREQ[key]){
    WXREQ[key]=true;
    const d=f.kickoff.slice(0,10);
    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${co[0]}&longitude=${co[1]}&hourly=temperature_2m,precipitation,wind_speed_10m&start_date=${d}&end_date=${d}`)
      .then(r=>r.json()).then(j=>{
        const hr=+f.kickoff.slice(11,13);
        const i=(j.hourly&&j.hourly.time||[]).findIndex(t=>+t.slice(11,13)===hr);
        if(i>=0){WX[key]={t:Math.round(j.hourly.temperature_2m[i]),p:+j.hourly.precipitation[i].toFixed(1),w:Math.round(j.hourly.wind_speed_10m[i])};if(TAB==="fixtures")render();}
      }).catch(()=>{});
  }
  return null;
}

function restDays(team,kick){
  if(!kick)return null;
  const k=new Date(kick);
  let cands=DB.plf.filter(f=>(f.team_h_name===team||f.team_a_name===team)&&f.kickoff&&f.started&&new Date(f.kickoff)<k).map(f=>new Date(f.kickoff));
  for(const c of (CAL||[])) if((c.home===team||c.away===team)&&c.kickoff&&new Date(c.kickoff)<k) cands.push(new Date(c.kickoff));
  if(!cands.length)return null;
  const prev=cands.sort((a,b)=>b-a)[0];
  return Math.round((k-prev)/864e5);
}

function tableFrom(ms){
  const t={};
  const touch=n=>t[n]||(t[n]={team:n,p:0,w:0,d:0,l:0,gf:0,ga:0,cs:0,pts:0,form:[],hw:0,hd:0,hl:0,aw:0,ad:0,al:0});
  const sorted=[...ms].filter(f=>f.fthg!=null).sort((a,b)=>String(a.match_date).localeCompare(String(b.match_date)));
  for(const f of sorted){
    const h=touch(f.home),a=touch(f.away);
    h.p++;a.p++;h.gf+=f.fthg;h.ga+=f.ftag;a.gf+=f.ftag;a.ga+=f.fthg;
    if(f.ftag===0)h.cs++; if(f.fthg===0)a.cs++;
    if(f.fthg>f.ftag){h.w++;h.hw++;a.l++;a.al++;h.pts+=3;h.form.push("W");a.form.push("L");}
    else if(f.fthg<f.ftag){a.w++;a.aw++;h.l++;h.hl++;a.pts+=3;a.form.push("W");h.form.push("L");}
    else{h.d++;h.hd++;a.d++;a.ad++;h.pts++;a.pts++;h.form.push("D");a.form.push("D");}
  }
  return Object.values(t).sort((x,y)=>y.pts-x.pts||(y.gf-y.ga)-(x.gf-x.ga)||y.gf-x.gf);
}

function timingChart(t){
  if(!t)return '<p class="muted small">No timing data for this season.</p>';
  const bands=["1-15","16-30","31-45","46-60","61-75","76+"];
  const vals=bands.map(b=>({b,f:t[b]?.goals||0,a:(t[b]?.against?.goals)||0}));
  const max=Math.max(1,...vals.map(v=>Math.max(v.f,v.a)));
  const W=620,Hh=160,bw=32,gap=(W-50)/6;
  let out=`<svg viewBox="0 0 ${W} ${Hh+34}" style="max-width:660px;width:100%">`;
  vals.forEach((v,i)=>{const x=35+i*gap;
    const hf=Math.round(v.f/max*Hh*0.88), ha=Math.round(v.a/max*Hh*0.88);
    out+=`<rect x="${x}" y="${Hh-hf}" width="${bw}" height="${Math.max(hf,1)}" fill="var(--green)" rx="3"><title>scored ${v.f} (${v.b}')</title></rect>`;
    out+=`<rect x="${x+bw+5}" y="${Hh-ha}" width="${bw}" height="${Math.max(ha,1)}" fill="var(--red)" rx="3"><title>conceded ${v.a} (${v.b}')</title></rect>`;
    out+=`<text x="${x+bw}" y="${Hh+18}" fill="var(--muted)" font-size="11" text-anchor="middle">${v.b}'</text>`;
    out+=`<text x="${x+bw/2}" y="${Hh-hf-4}" fill="var(--green)" font-size="11" text-anchor="middle">${v.f||""}</text>`;
    out+=`<text x="${x+bw+5+bw/2}" y="${Hh-ha-4}" fill="var(--red)" font-size="11" text-anchor="middle">${v.a||""}</text>`;});
  out+=`</svg>`;
  const tot=vals.reduce((s2,v)=>s2+v.f,0)||1, tota=vals.reduce((s2,v)=>s2+v.a,0)||1;
  const best=vals.reduce((a,b)=>b.f>a.f?b:a), worst=vals.reduce((a,b)=>b.a>a.a?b:a);
  const late=vals[5].f+vals[4].f, early=vals[0].f+vals[1].f;
  return out+`<p class="small" style="margin-top:6px">Scores most in <b class="pos">${best.b}'</b> (${Math.round(best.f/tot*100)}% of goals) · most vulnerable <b class="neg">${worst.b}'</b> (${Math.round(worst.a/tota*100)}% conceded) · ${late>early?'<b>late-game team</b> ('+Math.round(late/tot*100)+'% of goals after 60 min)':early>late?'<b>fast starter</b> ('+Math.round(early/tot*100)+'% of goals before 30 min)':'evenly spread across the match'}</p>`;
}
function butterfly(matches){

function halfSplit(team,season){

function styleChips(st){

/* ---- engine data loaders ---- */
let ALLPROF=null, PROFIX={}, ROTIX=null, CAL=null, CALreq=false, DRAWTAB=null;
async function ensureAllProfiles(){

    acc.push(...page); if(page.length<50)break;
  }
  ALLPROF=acc; PROFIX={}; PROFILES={};
  for(const p of acc){ PROFIX[p.team+"|"+p.season]=p; (PROFILES[p.team] ||= []).push(p); }
  for(const t in PROFILES) PROFILES[t].sort((a,b)=>a.season.localeCompare(b.season));
}
async function ensureRotation(){
  if(ROTIX)return;
  const rows=await api("pl_rotation?select=*&limit=2000");
  ROTIX={};
  const fxix={};
  for(const f of DB.plf){ if(f.event){ fxix[f.team_h_name+"|"+f.event]=f; fxix[f.team_a_name+"|"+f.event]=f; } }
  for(const r of rows){
    const f=fxix[r.team+"|"+r.event];
    if(f&&f.kickoff) ROTIX[r.team+"|"+f.kickoff.slice(0,10)]=r.rotation;

async function ensureCalendar(){

function drawEmp(favP){
  if(!DRAWTAB){
    DRAWTAB=[];
    const rows=(HIST||[]).filter(m=>m.b365h&&m.b365d&&m.b365a&&m.fthg!=null);
    const b=[0.40,0.48,0.56,0.64,0.72,0.85,1.01];
    for(let i=0;i<b.length-1;i++){
      const set=rows.filter(m=>{const s2=1/m.b365h+1/m.b365d+1/m.b365a;const p=Math.max((1/m.b365h)/s2,(1/m.b365a)/s2);return p>=b[i]&&p<b[i+1];});
      DRAWTAB.push({lo:b[i],hi:b[i+1],n:set.length,dr:set.length?set.filter(m=>m.fthg===m.ftag).length/set.length:0.25});
    }
  }
  const hit=DRAWTAB.find(x=>favP>=x.lo&&favP<x.hi);
  return hit&&hit.n>30?hit.dr:0.25;
}

/* ---- ratings & poisson ---- */
function teamRate(team,season){
  const pr=PROFIX[team+"|"+season];
  if(!pr||!pr.matches||!pr.matches.length)return null;
  const ms=pr.matches, n=ms.length, w=i=>Math.pow(0.93,n-1-i);
  let hx=0,hxa=0,hw=0,ax=0,axa=0,aw=0;
  ms.forEach((m,i)=>{const W=w(i); if(m.side==="h"){hx+=m.xg*W;hxa+=m.xga*W;hw+=W;} else {ax+=m.xg*W;axa+=m.xga*W;aw+=W;}});
  return {ah:hw?hx/hw:1.4, dh:hw?hxa/hw:1.4, aa:aw?ax/aw:1.2, da:aw?axa/aw:1.5, n};
}
function blendRate(team,season){
  const cur=teamRate(team,season);
  const seasons=Object.keys(PROFIX).filter(k=>k.startsWith(team+"|")).map(k=>k.split("|")[1]).sort();
  const prevSeason=seasons.filter(x=>x<season).pop();
  const prev=prevSeason?teamRate(team,prevSeason):null;
  if(cur&&(!prev||cur.n>=12))return {...cur,blended:false};
  if(cur&&prev){ const w=cur.n/(cur.n+8);
    return {ah:cur.ah*w+prev.ah*(1-w), dh:cur.dh*w+prev.dh*(1-w), aa:cur.aa*w+prev.aa*(1-w), da:cur.da*w+prev.da*(1-w), n:cur.n, blended:true};
  }
  return prev?{...prev,n:0,blended:true}:null;
}
function leagueAvg(season){
  let sx=0,c=0;
  for(const p of ALLPROF) if(p.season===season) for(const m of p.matches){sx+=m.xg;c++;}
  return c?sx/c:1.4;
}
function pois(l,k){let p=Math.exp(-l);for(let i=1;i<=k;i++)p*=l/i;return p;}
function poissonWDL(gA,gB){
  // Dixon-Coles low-score correction (rho<0 boosts 0-0/1-1, trims 1-0/0-1)
  const RHO=-0.11;
  const tau=(x,y)=>x===0&&y===0?1-gA*gB*RHO:x===0&&y===1?1+gA*RHO:x===1&&y===0?1+gB*RHO:x===1&&y===1?1-RHO:1;
  let w=0,d=0,l=0,tot=0,best={p:0,s:"1-1"};
  for(let a=0;a<=7;a++)for(let b=0;b<=7;b++){
    let p=pois(gA,a)*pois(gB,b)*tau(a,b); if(p<0)p=0; tot+=p;
    if(a>b)w+=p;else if(a===b)d+=p;else l+=p;
    if(p>best.p)best={p,s:a+"-"+b};
  }
  return {w:w/tot,d:d/tot,l:l/tot,best:best.s};
}

/* ---- archetypes & patterns ---- */
function archOf(st){
  const a=[]; if(!st)return a;
  if(st._ppda!=null){ if(st._ppda<9.5)a.push("HIGH-PRESS"); else if(st._ppda>12.5)a.push("LOW-BLOCK"); }
  const sit=st.situation||{}; const tot=Object.values(sit).reduce((x,y)=>x+(y.goals||0),0)||1;
  const sp=((sit["From corner"]||{}).goals||0)+((sit["Set piece"]||{}).goals||0)+((sit["Direct freekick"]||{}).goals||0);
  if(sp/tot>0.3)a.push("SET-PIECE");
  const spd=st.attackSpeed||{}; const stot=Object.values(spd).reduce((x,y)=>x+(y.goals||0),0)||1;
  if(((spd["Fast"]||{}).goals||0)/stot>0.25)a.push("TRANSITION");
  if(st._deep_per_match>=8)a.push("TERRITORIAL");
  return a;
}
function rotWeight(team,date){
  if(!ROTIX)return 1;
  const r=ROTIX[team+"|"+date];
  return r!=null&&r>=4?0.3:1;
}
function formAdj(team,season){
  const pr=PROFIX[team+"|"+season]; if(!pr||!pr.matches.length)return {v:0,n:0};
  const last=pr.matches.slice(-6);
  let sum=0,wt=0;
  last.forEach((m,i)=>{const W=(i+1)*rotWeight(team,m.date); sum+=(m.xg-m.xga)*W; wt+=W;});
  const v=wt?Math.max(-4,Math.min(4,(sum/wt)*2.2)):0;
  return {v:+v.toFixed(1),n:last.length};
}
function archPerf(team,arch){
  let pts=0,n=0,allPts=0,allN=0;
  for(const p of (PROFILES[team]||[])){
    for(const m of p.matches){
      const res=m.result==="w"?3:m.result==="d"?1:0;
      allPts+=res;allN++;
      const op=PROFIX[m.opp+"|"+p.season];
      if(op&&archOf(op.stats).includes(arch)){pts+=res;n++;}
    }
  }
  if(!n||!allN)return {v:0,n:0};
  const d=(pts/n)-(allPts/allN);
  return {v:+Math.max(-4,Math.min(4,d*3)).toFixed(1),n};
}
function h2hEvidence(A,B){
  const meets=[];
  for(const p of (PROFILES[A]||[])) for(const m of p.matches) if(m.opp===B) meets.push(m);
  if(!meets.length)return {v:0,n:0};
  let sum=0,wt=0;
  meets.forEach((m,i)=>{const W=i+1; sum+=(m.xg-m.xga)*W; wt+=W;});
  return {v:+Math.max(-3,Math.min(3,(sum/wt)*1.5)).toFixed(1),n:meets.length};
}
function allMatchDates(team){
  const ds=[];
  for(const f of DB.plf) if(f.started&&f.kickoff&&(f.team_h_name===team||f.team_a_name===team)) ds.push(f.kickoff);
  for(const c of (CAL||[])) if(c.kickoff&&(c.home===team||c.away===team)) ds.push(c.kickoff);
  return ds.sort();
}
function congestionAt(team,dateStr){
  const d=dateStr?new Date(dateStr):new Date();
  const ds=allMatchDates(team).map(x=>new Date(x));
  const prior=ds.filter(x=>x<d&&(d-x)<45*864e5);
  const in14=prior.filter(x=>(d-x)<=14*864e5).length;
  const rest=prior.length?Math.round((d-prior[prior.length-1])/864e5):null;
  const next=ds.find(x=>x>d);
  const sandwich=next?(next-d)<=4*864e5:false;
  return {in14,rest,sandwich};
}
function scriptPredict(stA,stB,prA,prB){
  const aA=archOf(stA), aB=archOf(stB);
  const topForm=st=>{const f=Object.values((st&&st.formation)||{}).sort((x,y)=>(+y.time||0)-(+x.time||0))[0];return f?f.stat:null;};
  const fA=topForm(stA), fB=topForm(stB);
  if(aA.includes("HIGH-PRESS")&&aB.includes("TRANSITION"))return {code:"E PRESS TRAP",why:"your side presses high into a fast-transition outlet — tail risk",lean:"BTTS Yes"};
  if(aB.includes("HIGH-PRESS")&&aA.includes("TRANSITION"))return {code:"E PRESS TRAP (favorable)",why:"opponent presses into YOUR transition threat",lean:"BTTS Yes"};
  if(aB.includes("LOW-BLOCK")&&(aA.includes("TERRITORIAL")||aA.includes("HIGH-PRESS")))return {code:"A SIEGE",why:"possession/territory vs a low block — draws spike, favorites overpriced",lean:"Under 2.5"};
  if(aA.includes("LOW-BLOCK")&&(aB.includes("TERRITORIAL")||aB.includes("HIGH-PRESS")))return {code:"A SIEGE (you defend it)",why:"you are the block — chaos favors you late",lean:"Under 2.5"};
  if(aA.includes("HIGH-PRESS")&&aB.includes("HIGH-PRESS"))return {code:"B OPEN EXCHANGE",why:"both press high — quality expresses, game opens",lean:"Over 2.5 / BTTS"};
  if(fA&&fB&&fA[0]==="3"&&fB&&/4-2-3-1|4-3-3/.test(fB))return {code:"D WING OVERLOAD",why:`back-3 wing-backs (${fA}) vs narrow ${fB}`,lean:"Moderate"};
  if(fA&&fB&&fA===fB)return {code:"C MIRROR",why:`same shape (${fA}) — PRS weight increases ~50%`,lean:"Moderate"};
  return {code:"C MIRROR-ish",why:"no dominant style collision detected",lean:"Follow expected goals"};
}

/* ---- the matchup engine ---- */
function matchupEngine(A,B,venueHome){
  const season=plSeason;
  const rA=blendRate(A,season), rB=blendRate(B,season);
  if(!rA||!rB)return null;
  const L=leagueAvg(season)||1.4;
  const gA=venueHome? rA.ah*rB.da/L : rA.aa*rB.dh/L;
  const gB=venueHome? rB.aa*rA.dh/L : rB.ah*rA.da/L;
  const P=poissonWDL(gA,gB);
  const emp=drawEmp(Math.max(P.w,P.l));
  const pd=(P.d+emp)/2;
  const scale=(1-pd)/(P.w+P.l||1);
  let win=P.w*scale*100;
  const fa=formAdj(A,season), fb=formAdj(B,season);
  const form={v:+Math.max(-4,Math.min(4,fa.v-fb.v)).toFixed(1),n:Math.min(fa.n,fb.n)};
  const stA=(PROFIX[A+"|"+season]||{}).stats, stB=(PROFIX[B+"|"+season]||{}).stats;
  const aB=archOf(stB);
  let arch={v:0,n:0};
  for(const ar of aB){const ap=archPerf(A,ar); if(Math.abs(ap.v)>Math.abs(arch.v))arch={...ap,vs:ar};}
  const h2h=h2hEvidence(A,B);
  const cgA=congestionAt(A,null), cgB=congestionAt(B,null);
  let cong={v:0,note:""};
  if(cgA.rest!=null&&cgB.rest!=null&&cgA.rest<20&&cgB.rest<20){
    cong.v=+Math.max(-3,Math.min(3,(Math.min(cgA.rest,9)-Math.min(cgB.rest,9))*0.7)).toFixed(1);
    cong.note=`${A} ${cgA.rest}d rest (${cgA.in14} games/14d)${cgA.sandwich?" SANDWICH":""} vs ${B} ${cgB.rest}d (${cgB.in14}/14d)${cgB.sandwich?" SANDWICH":""}`;
  }
  const script=scriptPredict(stA,stB);
  if(koMode!=="league") win=50+(win-50)*0.85; // knockout compression: upsets more likely, models less accurate
  const base=Math.round(Math.max(15,Math.min(85,win+form.v+arch.v+h2h.v+cong.v)));
  const relOf=t=>{const ps=DB.players.filter(p=>p.team===t&&p.xgi_share!=null&&p.xgi_share>0);return ps.length?ps.sort((a,b)=>b.xgi_share-a.xgi_share)[0]:null;};
  const relA=relOf(A), relB=relOf(B);
  const alerts=DB.players.filter(p=>(p.team===A||p.team===B)&&p.prs>=8&&p.status&&p.status!=="fit"&&p.status!=="unavailable");
  const lowSample=rA.n<8||rB.n<8;
  return {gA:+gA.toFixed(2),gB:+gB.toFixed(2),poisson:{w:+(P.w*scale*100).toFixed(1),d:+(pd*100).toFixed(1),l:+(P.l*scale*100).toFixed(1),best:P.best},
    win:+win.toFixed(1),form,arch,h2h,cong,script,base,alerts,lowSample,blended:rA.blended||rB.blended,nA:rA.n,nB:rB.n,
    totalG:+(gA+gB).toFixed(2),relA,relB};
}

function calendarPanel(team){
  if(!CAL)return "";
  const now=new Date();
  const mine=CAL.filter(c=>c.home===team||c.away===team);
  const past=mine.filter(c=>c.kickoff&&new Date(c.kickoff)<now).slice(-5);
  const next=mine.filter(c=>c.kickoff&&new Date(c.kickoff)>=now).slice(0,5);
  const plNext=DB.plf.filter(f=>!f.started&&f.kickoff&&(f.team_h_name===team||f.team_a_name===team)).slice(0,5)
    .map(f=>({comp:"PL",round:"MW"+f.event,kickoff:f.kickoff,home:f.team_h_name,away:f.team_a_name}));
  const upcoming=[...next,...plNext].sort((a,b)=>new Date(a.kickoff)-new Date(b.kickoff)).slice(0,6);
  // congestion sensitivity: PL results split by rest days (using all-comp calendar)
  const plms=DB.plf.filter(f=>f.finished&&(f.team_h_name===team||f.team_a_name===team)&&f.kickoff);
  let cN=0,cP=0,rN=0,rP=0;
  for(const f of plms){
    const cg=congestionAt(team,f.kickoff);
    if(cg.rest==null)continue;
    const home=f.team_h_name===team;
    const pts=(home?f.team_h_score>f.team_a_score:f.team_a_score>f.team_h_score)?3:(f.team_h_score===f.team_a_score?1:0);
    if(cg.rest<=4){cN++;cP+=pts;} else {rN++;rP+=pts;}
  }
  const chip=c=>`<span class="tag ${c==="PL"?"pend":c==="UCL"?"watch":c==="FA Cup"||c==="EFL Cup"?"hit":"avoid"}" style="margin-right:6px">${esc(c)}</span>`;
  return `<div class="panel"><h2>Calendar & Congestion — all competitions</h2>
  ${upcoming.length?`<p class="small muted" style="margin-bottom:4px">NEXT UP:</p>${upcoming.map(c=>`<div class="flex" style="margin:3px 0">${chip(c.comp)}<span class="num small">${new Date(c.kickoff).toLocaleString([],{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span><span class="small">${esc(c.home)} vs ${esc(c.away)}</span></div>`).join("")}`:`<p class="muted small">No upcoming fixtures on the calendar yet.</p>`}
  ${past.length?`<p class="small muted" style="margin:10px 0 4px">RECENT (cups/Europe):</p>${past.map(c=>`<div class="flex" style="margin:3px 0">${chip(c.comp)}<span class="num small">${c.event_date||""}</span><span class="small">${esc(c.home)} <b class="num">${c.home_score??""}${c.home_score!=null?"-":""}${c.away_score??""}</b> ${esc(c.away)}</span></div>`).join("")}`:""}
  ${(cN>=3&&rN>=3)?`<p class="small" style="margin-top:10px"><b class="muted">CONGESTION SENSITIVITY (PL, ${plms.length} matches):</b> ≤4 days rest → <b class="num ${cP/cN<rP/rN?"neg":"pos"}">${(cP/cN).toFixed(2)} PPG</b> (${cN} games) vs rested → <b class="num">${(rP/rN).toFixed(2)} PPG</b> (${rN}) ${cP/cN<rP/rN-0.4?`<span class="tag miss">FATIGUE-SENSITIVE</span>`:cP/cN>rP/rN?`<span class="tag hit">HANDLES LOAD</span>`:""}</p>`:`<p class="small muted" style="margin-top:10px">Congestion sensitivity: needs more matches with short rest this season (LOW SAMPLE).</p>`}
  </div>`;
}
function refPanel(){
  const agg={};
  for(const m of (HIST||[])){ if(!m.referee||m.fthg==null)continue; const r=agg[m.referee]||(agg[m.referee]={n:0,y:0,red:0,hw:0}); r.n++; r.y+=(m.hy||0)+(m.ay||0); r.red+=(m.hr||0)+(m.ar||0); if(m.fthg>m.ftag)r.hw++; }
  const rows=Object.entries(agg).map(([ref,v])=>({ref,...v})).filter(r=>r.n>=25).sort((a,b)=>(b.y/b.n)-(a.y/a.n));
  if(!rows.length)return "";

function marketPanel(){
  const rows=(HIST||[]).filter(m=>m.b365h&&m.b365d&&m.b365a&&m.fthg!=null);
  if(rows.length<100)return "";
  const bands=[[0.40,0.50],[0.50,0.60],[0.60,0.70],[0.70,0.80],[0.80,1.01]].map(([lo,hi])=>({lo,hi,n:0,wins:0,imp:0}));
  let dn=0,dw=0,dimp=0;
  for(const m of rows){
    const s2=1/m.b365h+1/m.b365d+1/m.b365a;
    const ph=(1/m.b365h)/s2, pa2=(1/m.b365a)/s2, pd=(1/m.b365d)/s2;
    dn++; dimp+=pd; if(m.fthg===m.ftag)dw++;
    const fav=ph>=pa2?{p:ph,won:m.fthg>m.ftag}:{p:pa2,won:m.ftag>m.fthg};
    for(const b of bands) if(fav.p>=b.lo&&fav.p<b.hi){b.n++;b.imp+=fav.p;if(fav.won)b.wins++;}
  }
  return `<div class="panel"><details><summary style="cursor:pointer"><b style="color:var(--accent)">MARKET BACKTEST</b> <span class="muted small">· ${rows.length} matches · closing odds, overround-stripped · click to expand</span></summary>
  <table style="margin-top:10px"><tr><th>Favorite priced</th><th>Matches</th><th>Market implied</th><th>Actually won</th><th>Market error</th></tr>
  ${bands.filter(b=>b.n>10).map(b=>{const imp=b.imp/b.n*100, act=b.wins/b.n*100, e=act-imp;return `<tr><td class="num">${Math.round(b.lo*100)}-${Math.round((b.hi>1?1:b.hi)*100)}%</td><td class="num">${b.n}</td><td class="num">${imp.toFixed(1)}%</td><td class="num">${act.toFixed(1)}%</td><td class="num ${e>0?"pos":"neg"}">${e>0?"+":""}${e.toFixed(1)}pp</td></tr>`}).join("")}
  <tr><td>Draws (all matches)</td><td class="num">${dn}</td><td class="num">${(dimp/dn*100).toFixed(1)}%</td><td class="num">${(dw/dn*100).toFixed(1)}%</td><td class="num ${dw/dn>dimp/dn?"pos":"neg"}">${((dw/dn-dimp/dn)*100).toFixed(1)}pp</td></tr></table>
  <p class="small muted" style="margin-top:8px">Negative = market overprices that band. Where favorites underdeliver vs implied, the Script A SIEGE thesis (favorites vs low blocks are systematically overpriced) has 5 seasons of evidence.</p></details></div>`;
}

  <div class="panel" style="padding:6px 10px"><table>
    <tr><th onclick="sortKey='name';render()">Player</th><th onclick="sortKey='team';render()">Team</th><th>Pos</th><th onclick="sortKey='prs';render()">PRS ▾</th><th>Sugg.</th><th>Status</th><th onclick="sortKey='pts';render()">Pts</th><th>Min</th><th>G+A</th><th>xG+xA</th><th>Mods</th><th></th></tr>
    ${rows.map(p=>{
      const effPrs = p.hot_streak&&p.prs===10?"11":p.prs;

      <td class="num ${mism?'neg':'muted'}" title="data-suggested PRS from league points percentile${mism?' — differs from your manual value by 2+':''}">${p.suggested_prs??"—"}</td>
      <td>${statusTag(p)}</td>
      <td class="num">${p.total_points??"—"}</td><td class="num muted small">${p.minutes??"—"}</td>
      <td class="num">${p.goals!=null?p.goals+"+"+p.assists:"—"}</td>
      <td class="num muted">${p.xg!=null?(+p.xg+ +(p.xa||0)).toFixed(1):"—"}</td>
      <td class="small">${p.penalty_taker?'<span class="tag pend">PEN</span>':''}${p.set_piece_taker?'<span class="tag pend">SP</span>':''}${p.hot_streak?`<span class="tag watch" title="${esc(p.streak_note||"")}">STREAK</span>`:''}</td>
      <td><button class="btn ghost sm" onclick="delPlayer(${p.id})">✕</button></td></tr>`}).join("")}
  </table></div>
  <div class="panel"><h2>PRS Scale</h2><table><tr><th>PRS</th><th>Tier</th><th>Win % impact when absent</th></tr>
  ${scale.map(sc=>`<tr><td class="num">${sc.prs}${sc.prs===4?" or less":""}</td><td>${esc(sc.tier)}</td><td class="num">${esc(sc.impact)}</td></tr>`).join("")}</table>
  <p class="small muted" style="margin-top:8px">PRS is YOUR judgment — the Sugg. column is a data-grounded starting point (league points percentile, min 600 minutes) and never overwrites your value. Red suggestion = disagrees with you by 2+, worth a look. Status/news auto-sync from the official FPL feed every 6 hours. Modifiers: partial fitness = fraction of penalty · bench-only ≈ half value · role cascade · hot streak (PRS 10 + 8-game run → 11) · elite depth absorbs +2-3%.</p></div>`;
}

/* ---------- CALCULATOR ---------- */
function vCalc(){
  return `
  <div class="panel"><h2>Pipeline Calculator — base → PRS → AIS → TMS → context</h2>
  <div class="formrow">
    <label>Base probability %<input id="c_base" type="number" value="${CALCPRE||50}" style="width:90px" oninput="calc()"></label>
    <label>PRS adjustment % (cap ±15)<input id="c_prs" type="number" value="0" style="width:90px" oninput="calc()"></label>
    <label>TMS adjustment % (cap ±6)<input id="c_tms" type="number" value="0" style="width:90px" oninput="calc()"></label>
    <label>Context % <input id="c_ctx" type="number" value="0" style="width:90px" oninput="calc()"></label>
  </div>
  <div class="formrow">
    <label>Home venue altitude (m)<input id="c_alt1" type="number" value="0" style="width:100px" oninput="calc()"></label>
    <label>Visitor origin altitude (m)<input id="c_alt2" type="number" value="0" style="width:100px" oninput="calc()"></label>
    <label>Is your pick the high-altitude side?<select id="c_side" onchange="calc()"><option value="1">Yes (+)</option><option value="-1">No (−)</option><option value="0">No altitude factor</option></select></label>
    <label><span>PRS 8+ in doubt?</span><input type="checkbox" id="c_doubt" style="width:20px;height:20px" onchange="calc()"></label>
    <label>Competition<select id="c_ko" onchange="calc()"><option value="league">League</option><option value="ko">Knockout (single tie)</option><option value="ko2">Knockout (two legs)</option></select></label>
  </div>
  <div class="calcout" id="c_out"></div>
  <p class="small muted" style="margin-top:10px">Stars auto-suggest from the final number. The lineup rule overrides everything: unresolved PRS 8+ doubt = AVOID until confirmed XIs, no exceptions.</p>
  </div>`;
}
function calc(){
  const g=id=>+document.getElementById(id).value||0;
  const base=g("c_base"), prs=cap(g("c_prs"),15), tms=cap(g("c_tms"),6), ctx=g("c_ctx");
  const side=+document.getElementById("c_side").value;
  const gap=Math.max(0,g("c_alt1")-g("c_alt2"));
  const goals=gap/1000*0.5, ais=side===0?0:Math.round(goals*11)*side;
  let final=Math.round(base+prs+ais+tms+ctx);
  const ko=document.getElementById("c_ko")?document.getElementById("c_ko").value:"league";
  if(ko==="ko") final=Math.round(50+(final-50)*0.85);
  const doubt=document.getElementById("c_doubt").checked;
  let stars,action;
  if(doubt){stars="⭐⭐";action="🚫 AVOID — PRS 8+ doubt unresolved. Wait for confirmed lineups (Rodri rule).";}
  else if(final>=65){stars="⭐⭐⭐⭐⭐";action="Bet with confidence";}
  else if(final>=50){stars="⭐⭐⭐⭐";action="Standard bet";}
  else if(final>=45){stars="⭐⭐⭐";action="Goals markets only / small";}
  else {stars="⭐⭐";action="🚫 AVOID — below threshold";}
  document.getElementById("c_out").innerHTML=`
    <div class="layers" style="justify-content:center">
      <div class="step"><div class="lk">Base</div><div class="lv">${base}%</div></div><div class="arr">→</div>
      <div class="step"><div class="lk">PRS</div><div class="lv">${prs>0?"+":""}${prs}%</div></div><div class="arr">→</div>
      <div class="step"><div class="lk">AIS</div><div class="lv">${ais>0?"+":""}${ais}%${gap>0&&side!==0?`<div class="small muted">${goals.toFixed(2)} goals</div>`:""}</div></div><div class="arr">→</div>
      <div class="step"><div class="lk">TMS</div><div class="lv">${tms>0?"+":""}${tms}%</div></div><div class="arr">→</div>
      <div class="step"><div class="lk">Ctx</div><div class="lv">${ctx>0?"+":""}${ctx}%</div></div>
    </div>
    <div class="big">${final}%</div>
    <div class="stars" style="font-size:22px">${stars}</div>
    <div style="margin-top:6px;font-weight:700;color:${action.startsWith("🚫")?"var(--red)":"var(--green)"}">${action}</div>
    ${ko==="ko"?`<p class="small muted" style="margin-top:6px">Knockout compression applied (−15% toward coin-flip): upsets are likelier and models weaker in one-off ties. Expect heavier rotation in early cup rounds — check the calendar.</p>`:ko==="ko2"?`<p class="small muted" style="margin-top:6px">Two-legged tie: judge the AGGREGATE, not the leg. Leg-1 favorites often manage games; the leg-2 away side knows exactly what it needs.</p>`:""}
    <p class="small muted" style="margin-top:4px">ENV layer: altitude above · weather counts too — wind 25km/h+ cuts long passing and totals; extreme heat slows tempo (cap weather at ±2-3% context; totals lean stronger than winner lean).</p>`;
}

/* ---------- IMPORT / EXPORT ---------- */
const IMPORT_SPEC = {
  version: 1,
  predictions: [{entry_no:26, match:"Team A vs Team B", competition:"Premier League", match_date:"2026-08-15", venue:"Anfield", stage:"predicted", pick:"Team A", base_prob:55, prs_adj:-4, ais_adj:0, tms_adj:3, context_adj:1, final_prob:55, stars:4, game_script:"B OPEN EXCHANGE", bets:[{market:"BTTS",pick:"Yes",prob:60}], is_avoid:false, lineup_watch:true, lineup_watch_note:"Player X (PRS 9) doubtful", layer_notes:{prs:"X doubtful -4%",tms:"open exchange +3%"}, fixture_id:null}],
  settle: [{entry_no:25, result:"Mexico 2-1", outcome:"HIT", audit_notes:"", closing_odds:2.4}],
  players: [{name:"Player", team:"Team", position:"ST", prs:8, status:"fit", fitness_pct:null, hot_streak:false, penalty_taker:false, set_piece_taker:false, notes:""}],
  coaches: [{name:"Coach", team:"Team", formations:"4-3-3", press:8, poss:7, risk:6, adapt:5, notes:""}],
  venues: [{stadium:"Stadium", city:"City", country:"Country", altitude_m:0, new_stadium:false, notes:""}],
  news: [{item_date:"2026-08-14", tag:"injury", headline:"...", body:"", match:"Team A vs Team B"}]
};
function vData(){
  return `
  <div class="panel"><h2>Paste-in JSON Import</h2>
  <p class="small muted" style="margin-bottom:8px">End an analysis session by asking Claude for an "import block" in the Hub format. Paste it here — predictions insert, entries settle by entry_no, players/coaches/venues upsert by name+team.</p>
  <textarea id="imp" rows="12" placeholder='{"version":1,"predictions":[...],"players":[...]}'></textarea>
  <div class="flex" style="margin-top:10px"><button class="btn" onclick="runImport()">Import</button>
  <button class="btn ghost" onclick="document.getElementById('imp').value=JSON.stringify(IMPORT_SPEC,null,2)">Show format example</button></div>
  <div id="impres" class="small" style="margin-top:8px"></div></div>

  <div class="panel"><h2>Session Briefing Export</h2>
  <p class="small muted" style="margin-bottom:8px">One click → a context block to paste into a new Claude session. Includes current record, open calls, lineup watches, PRS notables, hard rules, and the import format so the session can emit updates back.</p>
  <div class="flex"><button class="btn" onclick="briefing()">Generate briefing</button><button class="btn ghost" onclick="copyBrief()">Copy to clipboard</button></div>
  <textarea id="brief" rows="16" style="margin-top:10px"></textarea></div>

  <div class="panel"><h2>Full Backup</h2>
  <div class="flex"><button class="btn ghost" onclick="backup()">Download full JSON backup</button></div></div>`;
}
async function runImport(){
  let d; const out=document.getElementById("impres");
  try{d=JSON.parse(document.getElementById("imp").value);}catch(e){out.innerHTML='<span class="neg">Invalid JSON: '+esc(e.message)+'</span>';return;}
  const log=[];
  try{
    if(d.predictions?.length){await api("predictions",{method:"POST",body:d.predictions});log.push(d.predictions.length+" predictions added");}
    if(d.settle?.length){for(const s of d.settle){const{entry_no,...rest}=s; if(rest.closing_odds&&!rest.market_prob)rest.market_prob=+(100/rest.closing_odds).toFixed(1); rest.stage="settled"; await api("predictions?entry_no=eq."+entry_no,{method:"PATCH",body:rest});} log.push(d.settle.length+" entries settled");}
    if(d.players?.length){await api("players?on_conflict=name,team",{method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:d.players});log.push(d.players.length+" players upserted");}
    if(d.coaches?.length){await api("coaches?on_conflict=name,team",{method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:d.coaches});log.push(d.coaches.length+" coaches upserted");}
    if(d.venues?.length){await api("venues?on_conflict=stadium",{method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:d.venues});log.push(d.venues.length+" venues upserted");}
    if(d.news?.length){for(const n of d.news){const{match,...rest}=n; const p=DB.predictions.find(x=>x.match===match); if(p)rest.prediction_id=p.id; await api("news_items",{method:"POST",body:rest});} log.push(d.news.length+" news items added");}
    if(d.teams?.length){await api("teams?on_conflict=name",{method:"POST",headers:{Prefer:"resolution=merge-duplicates"},body:d.teams});log.push(d.teams.length+" teams upserted");}
    out.innerHTML='<span class="pos">✓ '+log.join(" · ")+'</span>'; toast("Import complete"); loadAll();
  }catch(e){out.innerHTML='<span class="neg">Import failed: '+esc(e.message)+'</span>';}
}
function briefing(){
  const t=tierStats(),bs=betStats();
  const pct=(h,tt)=>tt?Math.round(h/tt*100)+"%":"n/a";
  const open=DB.predictions.filter(p=>!p.outcome);
  const notable=DB.players.filter(p=>p.prs>=8||p.status!=="fit"||p.hot_streak);
  const lines=[
    "# FOOTBALL PREDICTION SYSTEM — SESSION BRIEFING",
    "Generated "+new Date().toISOString().slice(0,10)+" from the Hub. This is the current system state; use it as full context.",
    "",
    "## Premier League state",
    (()=>{const s=DB.plstate; if(!s)return "- no PL data synced";
      if(s.season_over)return `- Season ${s.season} COMPLETE (38/38). New season fixtures pending FPL reset.`;
      if(seasonNotStarted(s))return `- Season ${s.season} NOT STARTED. First kickoff: ${s.first_kickoff||"TBD"}.`;
      return `- Season ${s.season}, Matchweek ${s.current_gw} of 38. Table and form live in the Hub.`})(),
    "",
    "## Record",
    `- 5-6★: ${t.five.h}/${t.five.t} (${pct(t.five.h,t.five.t)}) · 4★: ${t.four.h}/${t.four.t} (${pct(t.four.h,t.four.t)}) · AVOID correct: ${t.avoid.h}/${t.avoid.t} · game-script bets: ${bs.h}/${bs.t}`,
    "",
    "## Open calls",
    ...(open.length?open.map(p=>`- [#${p.entry_no}] ${p.match} (${p.match_date||"TBD"})${p.pick?` — pick ${p.pick} ${p.final_prob}% ${"★".repeat(p.stars||0)}`:" — no call yet"}${p.lineup_watch?` — 👁 LINEUP WATCH: ${p.lineup_watch_note||"PRS 8+ doubt"}`:""}`):["- none"]),
    "",
    "## PRS notables (8+, non-fit, or streaking)",
    ...(notable.length?notable.map(p=>`- ${p.name} (${p.team}, ${p.position||"?"}) PRS ${p.prs}${p.hot_streak?" 🔥HOT-STREAK→11":""} — ${p.status}${p.penalty_taker?", pen taker":""}${p.notes?" — "+p.notes:""}`):["- none"]),
    "",
    "## Hard rules",
    ...(DB.settings.hard_rules||[]).map(r=>"- "+r),
    "",
    "## Pipeline",
    "Base → PRS (±15 cap) → AIS (alt gap m ÷1000 ×0.5 goals; 1 goal ≈ 10-12%) → TMS (±6 cap) → context = final. 65%+ = 5★ bet · 50-65% = 4★ · coin-flip = 3★ goals only · below/PRS-doubt = AVOID.",
    "",
    "## How to send updates back to the Hub",
    "End the session by outputting an import block (JSON) in exactly this shape; I will paste it into the Hub:",
    "```json",
    JSON.stringify(IMPORT_SPEC,null,1),
    "```"
  ];
  document.getElementById("brief").value=lines.join("\n");
}
function copyBrief(){const b=document.getElementById("brief");if(!b.value)briefing();b.select();navigator.clipboard.writeText(b.value).then(()=>toast("Briefing copied"));}
function backup(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="prediction-hub-backup-"+new Date().toISOString().slice(0,10)+".json";a.click();
}

setInterval(()=>syncPL(true), 5*60*1000); // refresh PL data every 5 min while the Hub is open
const _origRender=render; render=function(){_origRender(); if(TAB==="calculator")setTimeout(calc,0);};
